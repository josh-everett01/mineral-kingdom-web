name: Full Stack E2E

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ "**" ]  # run on pushes to feature branches too

concurrency:
  group: full-stack-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      # Next.js BFF route handlers use this to reach the backend API
      API_BASE_URL: http://localhost:8080
      # Keep backend in Testing so dev-only behaviors can be enabled
      ASPNETCORE_ENVIRONMENT: Testing

    steps:
      # --------------------
      # Checkout frontend repo (this repo)
      # --------------------
      - name: Checkout frontend
        uses: actions/checkout@v4

      # --------------------
      # Checkout backend repo into ./mineral-kingdom-api
      # Backend repo layout (observed from your logs):
      #   mineral-kingdom-api/
      #     mineral-kingdom-api/
      #       docker-compose.yml
      #       .env.example
      # --------------------
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: josh-everett01/mineral-kingdom-api
          path: mineral-kingdom-api
          fetch-depth: 1

      - name: Backend folder layout (debug)
        run: |
          set -euxo pipefail
          ls -lah
          ls -lah mineral-kingdom-api
          ls -lah mineral-kingdom-api/mineral-kingdom-api

      # --------------------
      # Prepare backend .env (compose references env_file: .env)
      # --------------------
      - name: Create backend .env from example
        working-directory: mineral-kingdom-api/mineral-kingdom-api
        run: |
          set -euxo pipefail

          if [ ! -f .env ]; then
            cp .env.example .env
          fi

          # Force Testing env inside containers
          if grep -q '^ASPNETCORE_ENVIRONMENT=' .env; then
            sed -i 's/^ASPNETCORE_ENVIRONMENT=.*/ASPNETCORE_ENVIRONMENT=Testing/' .env
          else
            echo 'ASPNETCORE_ENVIRONMENT=Testing' >> .env
          fi

          # Ensure JWT signing key exists for token issuance in tests
          if grep -q '^MK_JWT__SIGNING_KEY=' .env; then
            sed -i 's/^MK_JWT__SIGNING_KEY=.*/MK_JWT__SIGNING_KEY=CI_DEV_ONLY_CHANGE_ME_LONG_RANDOM_STRING_1234567890/' .env
          else
            echo 'MK_JWT__SIGNING_KEY=CI_DEV_ONLY_CHANGE_ME_LONG_RANDOM_STRING_1234567890' >> .env
          fi

          echo "---- .env (sanity) ----"
          grep -E '^(ASPNETCORE_ENVIRONMENT|MK_JWT__SIGNING_KEY|MK_DB__)=' .env || true

      # --------------------
      # Start backend with docker compose
      # --------------------
      - name: Start backend via docker compose
        working-directory: mineral-kingdom-api/mineral-kingdom-api
        run: |
          set -euxo pipefail
          docker compose up -d --build postgres api worker
          docker compose ps

      # --------------------
      # Wait for API readiness
      # Swagger may be disabled in Testing -> don't rely on /swagger.
      # We probe an actual endpoint and accept "not 000 and not 404".
      # --------------------
      - name: Wait for backend API to be ready
        run: |
          set -euxo pipefail
          echo "Waiting for API (POST /api/auth/register should return a non-404 once routing is live)..."

          for i in {1..60}; do
            code="$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "http://localhost:8080/api/auth/register" \
              -H "content-type: application/json" \
              -d '{}' || true)"

            echo "Attempt $i: HTTP $code"

            if [ "$code" != "000" ] && [ "$code" != "404" ]; then
              echo "API is ready (got HTTP $code)."
              exit 0
            fi

            sleep 2
          done

          echo "API did not become ready in time."
          docker ps || true
          exit 1

      # --------------------
      # Create a verified user for auth e2e (register + verify)
      # In Testing, backend should include verificationToken in RegisterResponse.
      # --------------------
      - name: Seed verified E2E user (register + verify)
        id: seed_user
        run: |
          set -euxo pipefail

          EMAIL="mk-ci-$(date +%s)-${RANDOM}@example.com"
          PASSWORD="Str0ngPass!123"

          echo "Creating user: $EMAIL"

          register_json="$(curl -fsS \
            -X POST "http://localhost:8080/api/auth/register" \
            -H "content-type: application/json" \
            -d "{\"email\":\"$EMAIL\",\"password\":\"$PASSWORD\"}")"

          echo "Register response: $register_json"

          TOKEN="$(echo "$register_json" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("verificationToken",""))')"
          if [ -z "$TOKEN" ]; then
            echo "verificationToken missing from register response (Testing env may not be returning it)."
            echo "Failing because auth e2e needs a verified account."
            exit 1
          fi

          # Verify email: OpenAPI says 200 with no content
          verify_code="$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "http://localhost:8080/api/auth/verify-email" \
            -H "content-type: application/json" \
            -d "{\"token\":\"$TOKEN\"}" || true)"

          echo "Verify status: $verify_code"
          if [ "$verify_code" != "200" ]; then
            echo "Verify-email failed with HTTP $verify_code"
            exit 1
          fi

          echo "email=$EMAIL" >> "$GITHUB_OUTPUT"
          echo "password=$PASSWORD" >> "$GITHUB_OUTPUT"

      # --------------------
      # Frontend install/build/lint + Playwright
      # --------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mineral-kingdom-web/package-lock.json

      - name: Install deps
        working-directory: mineral-kingdom-web
        run: npm ci

      - name: Lint
        working-directory: mineral-kingdom-web
        run: npm run lint

      - name: Build
        working-directory: mineral-kingdom-web
        run: npm run build

      - name: Install Playwright Browsers
        working-directory: mineral-kingdom-web
        run: npx playwright install --with-deps

      - name: E2E
        working-directory: mineral-kingdom-web
        env:
          E2E_EMAIL: ${{ steps.seed_user.outputs.email }}
          E2E_PASSWORD: ${{ steps.seed_user.outputs.password }}
          API_BASE_URL: http://localhost:8080
          ASPNETCORE_ENVIRONMENT: Testing
        run: npm run test:e2e

      - name: Upload Playwright report (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: mineral-kingdom-web/playwright-report/
          if-no-files-found: ignore

      - name: Dump backend logs on failure
        if: failure()
        working-directory: mineral-kingdom-api/mineral-kingdom-api
        run: |
          docker compose ps || true
          docker compose logs --no-color --tail 250 api || true
          docker compose logs --no-color --tail 250 worker || true
          docker compose logs --no-color --tail 250 postgres || true

      - name: Stop backend
        if: always()
        working-directory: mineral-kingdom-api/mineral-kingdom-api
        run: |
          docker compose down -v || true