name: Full Stack E2E

on:
  pull_request:
    branches: [ main ]
    paths:
      - "mineral-kingdom-web/**"
      - "mineral-kingdom-api/**"
      - ".github/workflows/full-stack-e2e.yml"
  push:
    branches: [ main ]
    paths:
      - "mineral-kingdom-web/**"
      - "mineral-kingdom-api/**"
      - ".github/workflows/full-stack-e2e.yml"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mk
          POSTGRES_PASSWORD: mk_dev_pw
          POSTGRES_DB: mk
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U mk -d mk"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------
      # Backend: build + run API
      # -------------------------
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore backend
        working-directory: mineral-kingdom-api/MineralKingdom
        run: dotnet restore MineralKingdom.sln

      - name: Build backend
        working-directory: mineral-kingdom-api/MineralKingdom
        run: dotnet build MineralKingdom.sln --configuration Release --no-restore

      - name: Start API (background)
        working-directory: mineral-kingdom-api/MineralKingdom
        env:
          ASPNETCORE_ENVIRONMENT: Testing
          ASPNETCORE_URLS: http://+:8080

          # DB (use localhost because API runs on host)
          MK_DB__HOST: localhost
          MK_DB__PORT: "5432"
          MK_DB__DATABASE: mk
          MK_DB__USERNAME: mk
          MK_DB__PASSWORD: mk_dev_pw

          # JWT signing key for auth
          MK_JWT__SIGNING_KEY: "ci_only_signing_key_change_me_1234567890"

          # Used in some link generation (safe to set)
          MK_APP__PUBLIC_URL: http://localhost:3005
        run: |
          nohup dotnet run --project MineralKingdom.Api/MineralKingdom.Api.csproj \
            --configuration Release --no-build --urls http://localhost:8080 \
            > /tmp/mk_api.log 2>&1 &
          echo "API started (logs at /tmp/mk_api.log)"

      - name: Wait for API ready
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/swagger/v1/swagger.json >/dev/null 2>&1; then
              echo "API is ready"
              exit 0
            fi
            sleep 2
          done
          echo "API failed to start. Logs:"
          tail -n 200 /tmp/mk_api.log || true
          exit 1

      # Optional: ensure the auth user exists + is verified for auth.spec.ts
      - name: Seed E2E user (register + verify if token returned)
        env:
          E2E_EMAIL: smoke_user1@example.com
          E2E_PASSWORD: Str0ngPass!123
        run: |
          set -euo pipefail

          # Register (ignore EMAIL_ALREADY_IN_USE)
          resp="$(curl -sS -X POST http://localhost:8080/api/auth/register \
            -H "content-type: application/json" \
            -d "{\"email\":\"$E2E_EMAIL\",\"password\":\"$E2E_PASSWORD\"}" || true)"

          echo "Register response: $resp"

          # If the backend returns verificationToken in Testing env, verify it
          token="$(node -e "try{const j=JSON.parse(process.argv[1]); console.log(j.verificationToken||'')}catch{console.log('')}" "$resp")"
          if [ -n "$token" ]; then
            echo "Verifying email with token..."
            curl -fsS -X POST http://localhost:8080/api/auth/verify-email \
              -H "content-type: application/json" \
              -d "{\"token\":\"$token\"}" >/dev/null
            echo "Verified."
          else
            echo "No verificationToken returned; skipping verify step."
          fi

      # -------------------------
      # Frontend: install + test
      # -------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mineral-kingdom-web/package-lock.json

      - name: Install deps
        working-directory: mineral-kingdom-web
        run: npm ci

      - name: Lint
        working-directory: mineral-kingdom-web
        run: npm run lint

      - name: Build
        working-directory: mineral-kingdom-web
        run: npm run build

      - name: Install Playwright Browsers
        working-directory: mineral-kingdom-web
        run: npx playwright install --with-deps

      - name: E2E
        working-directory: mineral-kingdom-web
        env:
          # IMPORTANT: Next dev server (started by Playwright) needs this for BFF proxying.
          API_BASE_URL: http://localhost:8080

          # Auth test creds
          E2E_EMAIL: smoke_user1@example.com
          E2E_PASSWORD: Str0ngPass!123

          # Playwright config uses PORT=3005 by default
          PORT: "3005"
        run: npm run test:e2e

      - name: Upload Playwright report (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: mineral-kingdom-web/playwright-report/
          if-no-files-found: ignore

      - name: Dump API logs on failure
        if: failure()
        run: |
          echo "==== API logs (tail) ===="
          tail -n 250 /tmp/mk_api.log || true