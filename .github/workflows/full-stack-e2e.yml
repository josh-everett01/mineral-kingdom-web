name: Full Stack E2E

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]

concurrency:
  group: full-stack-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      API_BASE_URL: http://localhost:8080
      ASPNETCORE_ENVIRONMENT: Testing

    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4

      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: josh-everett01/mineral-kingdom-api
          path: backend
          fetch-depth: 1

      - name: Debug backend folder layout
        run: |
          set -euxo pipefail
          ls -lah
          ls -lah backend
          ls -lah backend/mineral-kingdom-api
          test -f backend/mineral-kingdom-api/docker-compose.yml
          test -f backend/mineral-kingdom-api/.env.example

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Create backend .env from example
        working-directory: backend/mineral-kingdom-api
        run: |
          set -euxo pipefail

          if [ ! -f .env ]; then
            cp .env.example .env
          fi

          if grep -q '^ASPNETCORE_ENVIRONMENT=' .env; then
            sed -i 's/^ASPNETCORE_ENVIRONMENT=.*/ASPNETCORE_ENVIRONMENT=Testing/' .env
          else
            echo 'ASPNETCORE_ENVIRONMENT=Testing' >> .env
          fi

          if grep -q '^MK_JWT__SIGNING_KEY=' .env; then
            sed -i 's/^MK_JWT__SIGNING_KEY=.*/MK_JWT__SIGNING_KEY=CI_DEV_ONLY_CHANGE_ME_LONG_RANDOM_STRING_1234567890/' .env
          else
            echo 'MK_JWT__SIGNING_KEY=CI_DEV_ONLY_CHANGE_ME_LONG_RANDOM_STRING_1234567890' >> .env
          fi

      - name: Start Postgres (docker compose)
        working-directory: backend/mineral-kingdom-api
        run: |
          set -euxo pipefail
          docker compose up -d postgres
          docker compose ps
          docker ps

      - name: Wait for Postgres to be healthy
        run: |
          set -euxo pipefail
          for i in {1..60}; do
            if docker inspect --format='{{json .State.Health.Status}}' mk_postgres 2>/dev/null | grep -q '"healthy"'; then
              exit 0
            fi
            sleep 2
          done
          docker logs mk_postgres --tail 200 || true
          exit 1

      - name: Apply database migrations
        working-directory: backend/mineral-kingdom-api/MineralKingdom
        env:
          ASPNETCORE_ENVIRONMENT: Testing
          MK_DB__HOST: localhost
          MK_DB__PORT: "5432"
          MK_DB__NAME: mk
          MK_DB__USER: mk
          MK_DB__PASSWORD: mk_dev_pw
          MK_JWT__ISSUER: mineral-kingdom
          MK_JWT__AUDIENCE: mineral-kingdom-web
          MK_JWT__SIGNING_KEY: CI_DEV_ONLY_CHANGE_ME_LONG_RANDOM_STRING_1234567890
        run: |
          set -euxo pipefail
          dotnet restore MineralKingdom.sln
          dotnet tool install -g dotnet-ef
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH
          dotnet ef database update \
            --project MineralKingdom.Infrastructure \
            --startup-project MineralKingdom.Api

      - name: Start backend (api + worker)
        working-directory: backend/mineral-kingdom-api
        run: |
          set -euxo pipefail
          docker compose up -d --build api worker
          docker compose ps
          docker ps

      - name: Wait for backend API to be ready
        run: |
          set -euxo pipefail
          for i in {1..60}; do
            code="$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "http://localhost:8080/api/auth/register" \
              -H "content-type: application/json" \
              -d '{}' || true)"
            if [ "$code" != "000" ] && [ "$code" != "404" ] && [ "${code:0:1}" != "5" ]; then
              exit 0
            fi
            sleep 2
          done
          docker logs mk_api --tail 200 || true
          exit 1

      - name: Seed verified E2E user (register + verify)
        id: seed_user
        run: |
          set -euxo pipefail
          EMAIL="mk-ci-$(date +%s)-${RANDOM}@example.com"
          PASSWORD="Str0ngPass!123"

          register_json="$(curl -fsS \
            -X POST "http://localhost:8080/api/auth/register" \
            -H "content-type: application/json" \
            -d "{\"email\":\"$EMAIL\",\"password\":\"$PASSWORD\"}")"

          TOKEN="$(echo "$register_json" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("verificationToken",""))')"
          if [ -z "$TOKEN" ]; then
            echo "$register_json"
            exit 1
          fi

          curl -fsS -o /dev/null \
            -X POST "http://localhost:8080/api/auth/verify-email" \
            -H "content-type: application/json" \
            -d "{\"token\":\"$TOKEN\"}"

          echo "email=$EMAIL" >> "$GITHUB_OUTPUT"
          echo "password=$PASSWORD" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mineral-kingdom-web/package-lock.json

      - name: Install deps
        working-directory: mineral-kingdom-web
        run: npm ci

      - name: Lint
        working-directory: mineral-kingdom-web
        run: npm run lint

      - name: Build
        working-directory: mineral-kingdom-web
        run: npm run build

      - name: Install Playwright Browsers
        working-directory: mineral-kingdom-web
        run: npx playwright install --with-deps

      - name: E2E
        working-directory: mineral-kingdom-web
        env:
          E2E_EMAIL: ${{ steps.seed_user.outputs.email }}
          E2E_PASSWORD: ${{ steps.seed_user.outputs.password }}
          API_BASE_URL: http://localhost:8080
          ASPNETCORE_ENVIRONMENT: Testing
        run: npm run test:e2e

      - name: Upload Playwright report (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: mineral-kingdom-web/playwright-report/
          if-no-files-found: ignore

      - name: Dump backend logs on failure
        if: failure()
        working-directory: backend/mineral-kingdom-api
        run: |
          docker compose ps || true
          docker compose logs --no-color --tail 200 postgres api worker || true

      - name: Stop backend
        if: always()
        working-directory: backend/mineral-kingdom-api
        run: |
          docker compose down -v || true