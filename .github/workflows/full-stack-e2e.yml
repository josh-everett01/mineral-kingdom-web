name: Full Stack E2E

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      # Next.js BFF will call this
      API_BASE_URL: http://localhost:8080

      # Make backend include verificationToken in RegisterResponse (Testing behavior)
      ASPNETCORE_ENVIRONMENT: Testing

      # Playwright config defaults to localhost:${PORT}; no need to set unless you want to override
      # PLAYWRIGHT_BASE_URL: http://localhost:3005

    steps:
      # --- Frontend repo ---
      - name: Checkout frontend
        uses: actions/checkout@v4

      # --- Backend repo (checked out into subfolder) ---
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: josh-everett01/mineral-kingdom-api
          path: mineral-kingdom-api
          fetch-depth: 1

      - name: Start backend via docker compose
        working-directory: mineral-kingdom-api
        run: |
          ls -lah
          test -f docker-compose.yml
          docker compose -f docker-compose.yml up -d --build postgres api worker
          docker compose -f docker-compose.yml ps

      - name: Wait for backend API to be ready
        run: |
          echo "Waiting for API /health..."
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/health >/dev/null; then
              echo "API is ready."
              exit 0
            fi
            sleep 2
          done

          echo "API did not become ready in time."
          docker ps
          docker logs mk_api --tail 200 || true
          exit 1

      # Seed a verified user for auth e2e (so we can unskip auth.spec.ts)
      - name: Seed verified E2E user
        run: |
          set -euo pipefail

          EMAIL="e2e-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}@example.com"
          PASSWORD="Str0ngPass!123"

          echo "Creating user ${EMAIL}..."
          RESP="$(curl -fsS -X POST "http://localhost:8080/api/auth/register" \
            -H "content-type: application/json" \
            -d "{\"email\":\"${EMAIL}\",\"password\":\"${PASSWORD}\"}")"

          echo "$RESP" > /tmp/register.json
          TOKEN="$(cat /tmp/register.json | jq -r '.verificationToken // empty')"

          if [ -z "$TOKEN" ]; then
            echo "No verificationToken returned. Response was:"
            cat /tmp/register.json
            exit 1
          fi

          echo "Verifying email..."
          curl -fsS -X POST "http://localhost:8080/api/auth/verify-email" \
            -H "content-type: application/json" \
            -d "{\"token\":\"${TOKEN}\"}" >/dev/null

          echo "E2E_EMAIL=${EMAIL}" >> "$GITHUB_ENV"
          echo "E2E_PASSWORD=${PASSWORD}" >> "$GITHUB_ENV"

      # --- Frontend deps/build/test ---
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mineral-kingdom-web/package-lock.json

      - name: Install deps
        working-directory: mineral-kingdom-web
        run: npm ci

      - name: Lint
        working-directory: mineral-kingdom-web
        run: npm run lint

      - name: Build
        working-directory: mineral-kingdom-web
        run: npm run build

      - name: Install Playwright Browsers
        working-directory: mineral-kingdom-web
        run: npx playwright install --with-deps

      - name: E2E
        working-directory: mineral-kingdom-web
        run: npm run test:e2e

      - name: Upload Playwright report (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: mineral-kingdom-web/playwright-report/
          if-no-files-found: ignore

      - name: Dump backend logs on failure
        if: failure()
        run: |
          docker ps
          docker logs mk_api --tail 200 || true
          docker logs mk_worker --tail 200 || true

      - name: Stop backend
        if: always()
        working-directory: mineral-kingdom-api
        run: |
          docker compose -f docker-compose.yml down -v