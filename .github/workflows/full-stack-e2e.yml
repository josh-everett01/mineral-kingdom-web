name: Full Stack E2E

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      # Next.js BFF route handlers use this to reach the backend API
      API_BASE_URL: http://localhost:8080

    steps:
      # --------------------
      # Checkout frontend repo (this repo)
      # --------------------
      - name: Checkout frontend
        uses: actions/checkout@v4

      # --------------------
      # Checkout backend repo into ./backend
      # Backend repo layout (from your logs):
      #   backend/mineral-kingdom-api/docker-compose.yml
      #   backend/mineral-kingdom-api/.env.example
      # --------------------
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: josh-everett01/mineral-kingdom-api
          path: backend
          fetch-depth: 1

      - name: Backend folder layout (debug)
        run: |
          set -euxo pipefail
          ls -lah
          ls -lah backend
          ls -lah backend/mineral-kingdom-api

      # --------------------
      # Prepare backend .env (compose references env_file: .env)
      # IMPORTANT: ensure ALL required JWT vars exist (issuer/audience/signing key)
      # --------------------
      - name: Create backend .env from example
        working-directory: backend/mineral-kingdom-api
        run: |
          set -euxo pipefail

          if [ ! -f .env ]; then
            cp .env.example .env
          fi

          ensure_env () {
            key="$1"
            val="$2"
            if grep -q "^${key}=" .env; then
              sed -i "s|^${key}=.*|${key}=${val}|" .env
            else
              echo "${key}=${val}" >> .env
            fi
          }

          # Force Testing env inside containers
          ensure_env "ASPNETCORE_ENVIRONMENT" "Testing"

          # These are REQUIRED for login/token issuance (fixes "MK_JWT config is missing")
          ensure_env "MK_JWT__ISSUER" "mineral-kingdom"
          ensure_env "MK_JWT__AUDIENCE" "mineral-kingdom-web"
          ensure_env "MK_JWT__SIGNING_KEY" "CI_DEV_ONLY_LONG_RANDOM_STRING_1234567890_ABCDEFGHIJKLMNOPQRSTUVWXYZ"

          echo "---- .env (sanity) ----"
          grep -E '^(ASPNETCORE_ENVIRONMENT|MK_JWT__ISSUER|MK_JWT__AUDIENCE|MK_JWT__SIGNING_KEY|MK_DB__)=' .env || true

      # --------------------
      # Start backend with docker compose
      # --------------------
      - name: Start backend via docker compose
        working-directory: backend/mineral-kingdom-api
        run: |
          set -euxo pipefail
          docker compose up -d --build postgres api worker
          docker ps

      # --------------------
      # Wait for API readiness
      # In Testing env, swagger can be 404; probe a real route instead.
      # --------------------
      - name: Wait for backend API to be ready
        run: |
          set -euxo pipefail
          echo "Waiting for API (POST /api/auth/register should return non-000 once routing is live)..."

          for i in {1..60}; do
            code="$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "http://localhost:8080/api/auth/register" \
              -H "content-type: application/json" \
              -d '{}' || true)"

            echo "Attempt $i: HTTP $code"

            if [ "$code" != "000" ]; then
              echo "API is responding (HTTP $code)."
              exit 0
            fi

            sleep 2
          done

          echo "API did not become ready in time."
          docker ps || true
          docker logs mk_api --tail 200 || true
          exit 1

      # --------------------
      # Seed a verified user for auth e2e
      # (Testing env returns verificationToken on register in your backend)
      # --------------------
      - name: Seed verified E2E user (register + verify)
        id: seed_user
        run: |
          set -euxo pipefail

          EMAIL="mk-ci-$(date +%s)-${RANDOM}@example.com"
          PASSWORD="Str0ngPass!123"

          echo "Creating user: $EMAIL"

          register_json="$(curl -fsS \
            -X POST "http://localhost:8080/api/auth/register" \
            -H "content-type: application/json" \
            -d "{\"email\":\"$EMAIL\",\"password\":\"$PASSWORD\"}")"

          TOKEN="$(echo "$register_json" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("verificationToken",""))')"
          if [ -z "$TOKEN" ]; then
            echo "Register response did not include verificationToken:"
            echo "$register_json"
            exit 1
          fi

          # verify-email is 200 with no body (per your OpenAPI snippet)
          curl -fsS -o /dev/null \
            -X POST "http://localhost:8080/api/auth/verify-email" \
            -H "content-type: application/json" \
            -d "{\"token\":\"$TOKEN\"}"

          echo "email=$EMAIL" >> "$GITHUB_OUTPUT"
          echo "password=$PASSWORD" >> "$GITHUB_OUTPUT"

      # --------------------
      # Frontend install/build/lint + Playwright
      # --------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mineral-kingdom-web/package-lock.json

      - name: Install deps
        working-directory: mineral-kingdom-web
        run: npm ci

      - name: Lint
        working-directory: mineral-kingdom-web
        run: npm run lint

      - name: Build
        working-directory: mineral-kingdom-web
        run: npm run build

      - name: Install Playwright Browsers
        working-directory: mineral-kingdom-web
        run: npx playwright install --with-deps

      - name: E2E
        working-directory: mineral-kingdom-web
        env:
          API_BASE_URL: http://localhost:8080
          E2E_EMAIL: ${{ steps.seed_user.outputs.email }}
          E2E_PASSWORD: ${{ steps.seed_user.outputs.password }}
        run: npm run test:e2e

      - name: Upload Playwright report (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: mineral-kingdom-web/playwright-report/
          if-no-files-found: ignore

      - name: Dump backend logs on failure
        if: failure()
        run: |
          docker ps || true
          docker logs mk_api --tail 200 || true
          docker logs mk_worker --tail 200 || true
          docker logs mk_postgres --tail 200 || true

      - name: Stop backend
        if: always()
        working-directory: backend/mineral-kingdom-api
        run: |
          docker compose down -v || true