# .github/workflows/full-stack-e2e.yml
name: Full Stack E2E

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
    # Optional: restrict when this runs
    paths:
      - "mineral-kingdom-web/**"
      - ".github/workflows/full-stack-e2e.yml"

# Prevent duplicate runs and cancel superseded runs on the same PR
concurrency:
  group: full-stack-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      # Next.js BFF route handlers use this to reach the backend API
      API_BASE_URL: http://localhost:8080
      # Backend behavior (token surfacing, etc.)
      ASPNETCORE_ENVIRONMENT: Testing

    steps:
      # --------------------
      # Checkout frontend repo (this repo)
      # --------------------
      - name: Checkout frontend
        uses: actions/checkout@v4

      # --------------------
      # Checkout backend repo into ./mineral-kingdom-api
      # --------------------
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: josh-everett01/mineral-kingdom-api
          path: mineral-kingdom-api
          fetch-depth: 1

      # --------------------
      # Resolve backend dir (repo may contain nested mineral-kingdom-api/)
      # IMPORTANT: $GITHUB_ENV applies to the NEXT step, so we must also
      # keep a local BACKEND_DIR variable inside this step.
      # --------------------
      - name: Resolve backend root folder
        run: |
          set -euxo pipefail

          BACKEND_DIR=""

          if [ -f "mineral-kingdom-api/.env.example" ] && [ -f "mineral-kingdom-api/docker-compose.yml" ]; then
            BACKEND_DIR="mineral-kingdom-api"
          elif [ -f "mineral-kingdom-api/mineral-kingdom-api/.env.example" ] && [ -f "mineral-kingdom-api/mineral-kingdom-api/docker-compose.yml" ]; then
            BACKEND_DIR="mineral-kingdom-api/mineral-kingdom-api"
          else
            echo "ERROR: Could not locate backend .env.example + docker-compose.yml"
            echo "Top-level:"
            ls -lah || true
            echo "mineral-kingdom-api:"
            ls -lah mineral-kingdom-api || true
            echo "mineral-kingdom-api/mineral-kingdom-api:"
            ls -lah mineral-kingdom-api/mineral-kingdom-api || true
            exit 1
          fi

          echo "Resolved BACKEND_DIR=$BACKEND_DIR"
          ls -lah "$BACKEND_DIR"

          # Export for subsequent steps
          echo "BACKEND_DIR=$BACKEND_DIR" >> "$GITHUB_ENV"

      # --------------------
      # Prepare backend .env (compose references env_file: .env)
      # --------------------
      - name: Create backend .env from example
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          set -euxo pipefail

          if [ ! -f .env ]; then
            cp .env.example .env
          fi

          # Force Testing in containers
          if grep -q '^ASPNETCORE_ENVIRONMENT=' .env; then
            sed -i 's/^ASPNETCORE_ENVIRONMENT=.*/ASPNETCORE_ENVIRONMENT=Testing/' .env
          else
            echo 'ASPNETCORE_ENVIRONMENT=Testing' >> .env
          fi

          # Ensure JWT signing key is usable in CI (not placeholder)
          if grep -q '^MK_JWT__SIGNING_KEY=' .env; then
            sed -i 's/^MK_JWT__SIGNING_KEY=.*/MK_JWT__SIGNING_KEY=CI_DEV_ONLY_CHANGE_ME_LONG_RANDOM_STRING_1234567890/' .env
          else
            echo 'MK_JWT__SIGNING_KEY=CI_DEV_ONLY_CHANGE_ME_LONG_RANDOM_STRING_1234567890' >> .env
          fi

          echo "---- .env sanity ----"
          grep -E '^(ASPNETCORE_ENVIRONMENT|MK_DB__|MK_JWT__SIGNING_KEY)=' .env || true

      # --------------------
      # Start ONLY postgres first
      # --------------------
      - name: Start postgres
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          set -euxo pipefail
          docker compose up -d postgres
          docker ps

      - name: Wait for postgres healthy
        run: |
          set -euxo pipefail
          for i in {1..60}; do
            # container_name is mk_postgres in docker-compose.yml
            health="$(docker inspect -f '{{.State.Health.Status}}' mk_postgres 2>/dev/null || true)"
            echo "Attempt $i: postgres health=$health"
            if [ "$health" = "healthy" ]; then
              echo "Postgres is healthy."
              exit 0
            fi
            sleep 2
          done
          echo "Postgres did not become healthy in time."
          docker ps || true
          docker logs mk_postgres --tail 200 || true
          exit 1

      # --------------------
      # Apply EF migrations (fixes: "relation users does not exist")
      # --------------------
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install dotnet-ef
        run: |
          set -euxo pipefail
          dotnet tool install --global dotnet-ef
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
          dotnet ef --version

      - name: Run migrations
        working-directory: ${{ env.BACKEND_DIR }}
        env:
          # Migrations run on the runner against the published Postgres port
          MK_DB__HOST: localhost
          MK_DB__PORT: "5432"
          MK_DB__NAME: mk
          MK_DB__USER: mk
          MK_DB__PASSWORD: mk_dev_pw
          ASPNETCORE_ENVIRONMENT: Testing
        run: |
          set -euxo pipefail

          dotnet restore MineralKingdom/MineralKingdom.sln

          dotnet ef database update \
            --project MineralKingdom/MineralKingdom.Infrastructure/MineralKingdom.Infrastructure.csproj \
            --startup-project MineralKingdom/MineralKingdom.Api/MineralKingdom.Api.csproj

      # --------------------
      # Start api + worker after schema exists
      # --------------------
      - name: Start api + worker
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          set -euxo pipefail
          docker compose up -d --build api worker
          docker ps

      - name: Wait for backend API to be ready
        run: |
          set -euxo pipefail
          echo "Waiting for API..."

          for i in {1..60}; do
            # Prefer /db-ping if present
            code="$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/db-ping || true)"
            echo "Attempt $i: /db-ping HTTP $code"

            if [ "$code" = "200" ]; then
              echo "API is ready."
              exit 0
            fi

            # If /db-ping isn't available, probe register route (anything but 000/404 is good)
            if [ "$code" = "404" ]; then
              code2="$(curl -s -o /dev/null -w "%{http_code}" \
                -X POST "http://localhost:8080/api/auth/register" \
                -H "content-type: application/json" \
                -d '{}' || true)"
              echo "Attempt $i: /api/auth/register probe HTTP $code2"
              if [ "$code2" != "000" ] && [ "$code2" != "404" ]; then
                echo "API is ready (register probe HTTP $code2)."
                exit 0
              fi
            fi

            sleep 2
          done

          echo "API did not become ready in time."
          docker ps || true
          docker logs mk_api --tail 200 || true
          exit 1

      # --------------------
      # Seed verified E2E user (register + verify)
      # --------------------
      - name: Seed verified E2E user (register + verify)
        id: seed_user
        run: |
          set -euxo pipefail

          EMAIL="mk-ci-$(date +%s)-${RANDOM}@example.com"
          PASSWORD="Str0ngPass!123"

          echo "Creating user: $EMAIL"

          register_json="$(curl -fsS \
            -X POST "http://localhost:8080/api/auth/register" \
            -H "content-type: application/json" \
            -d "{\"email\":\"$EMAIL\",\"password\":\"$PASSWORD\"}")"

          TOKEN="$(echo "$register_json" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("verificationToken",""))')"
          if [ -z "$TOKEN" ]; then
            echo "Register response did not include verificationToken. Response was:"
            echo "$register_json"
            exit 1
          fi

          # Verify email (OpenAPI indicates 200 with empty body)
          curl -fsS -o /dev/null \
            -X POST "http://localhost:8080/api/auth/verify-email" \
            -H "content-type: application/json" \
            -d "{\"token\":\"$TOKEN\"}"

          echo "email=$EMAIL" >> "$GITHUB_OUTPUT"
          echo "password=$PASSWORD" >> "$GITHUB_OUTPUT"

      # --------------------
      # Frontend install/build/lint + Playwright
      # --------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mineral-kingdom-web/package-lock.json

      - name: Install deps
        working-directory: mineral-kingdom-web
        run: npm ci

      - name: Lint
        working-directory: mineral-kingdom-web
        run: npm run lint

      - name: Build
        working-directory: mineral-kingdom-web
        run: npm run build

      - name: Install Playwright Browsers
        working-directory: mineral-kingdom-web
        run: npx playwright install --with-deps

      - name: E2E
        working-directory: mineral-kingdom-web
        env:
          E2E_EMAIL: ${{ steps.seed_user.outputs.email }}
          E2E_PASSWORD: ${{ steps.seed_user.outputs.password }}
          API_BASE_URL: http://localhost:8080
          ASPNETCORE_ENVIRONMENT: Testing
        run: npm run test:e2e

      - name: Upload Playwright report (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: mineral-kingdom-web/playwright-report/
          if-no-files-found: ignore

      - name: Dump backend logs on failure
        if: failure()
        run: |
          docker ps || true
          docker logs mk_api --tail 300 || true
          docker logs mk_worker --tail 300 || true
          docker logs mk_postgres --tail 300 || true

      - name: Stop backend
        if: always()
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          docker compose down -v || true