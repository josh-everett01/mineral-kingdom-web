name: Full Stack E2E

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

concurrency:
  group: full-stack-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      # Next.js BFF route handlers use this to reach the backend API
      API_BASE_URL: http://localhost:8080
      # Backend behavior (token surfacing, etc.)
      ASPNETCORE_ENVIRONMENT: Testing

    steps:
      # --------------------
      # Checkout frontend repo (this repo)
      # --------------------
      - name: Checkout frontend
        uses: actions/checkout@v4

      # --------------------
      # Checkout backend repo into ./mineral-kingdom-api
      # --------------------
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: josh-everett01/mineral-kingdom-api
          path: mineral-kingdom-api
          fetch-depth: 1

      - name: Backend folder layout (debug)
        run: |
          set -euxo pipefail
          ls -lah
          ls -lah mineral-kingdom-api

      # --------------------
      # Prepare backend .env (compose references env_file: .env)
      # --------------------
      - name: Create backend .env from example
        working-directory: mineral-kingdom-api
        run: |
          set -euxo pipefail

          if [ ! -f .env ]; then
            cp .env.example .env
          fi

          # Force Testing in the backend containers
          if grep -q '^ASPNETCORE_ENVIRONMENT=' .env; then
            sed -i 's/^ASPNETCORE_ENVIRONMENT=.*/ASPNETCORE_ENVIRONMENT=Testing/' .env
          else
            echo 'ASPNETCORE_ENVIRONMENT=Testing' >> .env
          fi

          # Ensure JWT signing key is usable in CI (not placeholder)
          if grep -q '^MK_JWT__SIGNING_KEY=' .env; then
            sed -i 's/^MK_JWT__SIGNING_KEY=.*/MK_JWT__SIGNING_KEY=CI_DEV_ONLY_CHANGE_ME_LONG_RANDOM_STRING_1234567890/' .env
          else
            echo 'MK_JWT__SIGNING_KEY=CI_DEV_ONLY_CHANGE_ME_LONG_RANDOM_STRING_1234567890' >> .env
          fi

          echo "---- .env sanity ----"
          grep -E '^(ASPNETCORE_ENVIRONMENT|MK_DB__|MK_JWT__SIGNING_KEY)=' .env || true

      # --------------------
      # Start ONLY postgres first
      # --------------------
      - name: Start postgres
        working-directory: mineral-kingdom-api
        run: |
          set -euxo pipefail
          docker compose up -d postgres
          docker ps

      - name: Wait for postgres healthy
        working-directory: mineral-kingdom-api
        run: |
          set -euxo pipefail
          for i in {1..60}; do
            if docker compose ps --format json | jq -e '.[] | select(.Service=="postgres") | .Health=="healthy"' >/dev/null 2>&1; then
              echo "Postgres is healthy."
              exit 0
            fi
            sleep 2
          done
          echo "Postgres did not become healthy in time."
          docker compose ps
          docker logs mk_postgres --tail 200 || true
          exit 1

      # --------------------
      # Apply EF migrations (fixes: "relation users does not exist")
      # --------------------
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef

      - name: Run migrations
        working-directory: mineral-kingdom-api
        env:
          # IMPORTANT: migrations run on the runner against the published port
          MK_DB__HOST: localhost
          MK_DB__PORT: "5432"
          MK_DB__NAME: mk
          MK_DB__USER: mk
          MK_DB__PASSWORD: mk_dev_pw
          ASPNETCORE_ENVIRONMENT: Testing
        run: |
          set -euxo pipefail

          dotnet restore MineralKingdom/MineralKingdom.sln

          dotnet ef database update \
            --project MineralKingdom/MineralKingdom.Infrastructure/MineralKingdom.Infrastructure.csproj \
            --startup-project MineralKingdom/MineralKingdom.Api/MineralKingdom.Api.csproj

      # --------------------
      # Start api + worker after schema exists
      # --------------------
      - name: Start api + worker
        working-directory: mineral-kingdom-api
        run: |
          set -euxo pipefail
          docker compose up -d --build api worker
          docker ps

      - name: Wait for backend API to be ready (db-ping)
        run: |
          set -euxo pipefail
          echo "Waiting for API..."
          for i in {1..60}; do
            code="$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/db-ping || true)"
            echo "Attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then
              echo "API is ready."
              exit 0
            fi
            sleep 2
          done
          echo "API did not become ready in time."
          docker ps || true
          docker logs mk_api --tail 200 || true
          exit 1

      # --------------------
      # Seed verified E2E user (register + verify)
      # --------------------
      - name: Seed verified E2E user (register + verify)
        id: seed_user
        run: |
          set -euxo pipefail

          EMAIL="mk-ci-$(date +%s)-${RANDOM}@example.com"
          PASSWORD="Str0ngPass!123"

          echo "Creating user: $EMAIL"

          register_json="$(curl -fsS \
            -X POST "http://localhost:8080/api/auth/register" \
            -H "content-type: application/json" \
            -d "{\"email\":\"$EMAIL\",\"password\":\"$PASSWORD\"}")"

          TOKEN="$(echo "$register_json" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("verificationToken",""))')"
          if [ -z "$TOKEN" ]; then
            echo "Register response did not include verificationToken. Response was:"
            echo "$register_json"
            exit 1
          fi

          # Verify email (endpoint returns 200 with empty body per OpenAPI)
          curl -fsS -o /dev/null \
            -X POST "http://localhost:8080/api/auth/verify-email" \
            -H "content-type: application/json" \
            -d "{\"token\":\"$TOKEN\"}"

          echo "email=$EMAIL" >> "$GITHUB_OUTPUT"
          echo "password=$PASSWORD" >> "$GITHUB_OUTPUT"

      # --------------------
      # Frontend install/build/lint + Playwright
      # --------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mineral-kingdom-web/package-lock.json

      - name: Install deps
        working-directory: mineral-kingdom-web
        run: npm ci

      - name: Lint
        working-directory: mineral-kingdom-web
        run: npm run lint

      - name: Build
        working-directory: mineral-kingdom-web
        run: npm run build

      - name: Install Playwright Browsers
        working-directory: mineral-kingdom-web
        run: npx playwright install --with-deps

      - name: E2E
        working-directory: mineral-kingdom-web
        env:
          E2E_EMAIL: ${{ steps.seed_user.outputs.email }}
          E2E_PASSWORD: ${{ steps.seed_user.outputs.password }}
          API_BASE_URL: http://localhost:8080
          ASPNETCORE_ENVIRONMENT: Testing
        run: npm run test:e2e

      - name: Upload Playwright report (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: mineral-kingdom-web/playwright-report/
          if-no-files-found: ignore

      - name: Dump backend logs on failure
        if: failure()
        working-directory: mineral-kingdom-api
        run: |
          docker ps || true
          docker logs mk_api --tail 300 || true
          docker logs mk_worker --tail 300 || true
          docker logs mk_postgres --tail 300 || true

      - name: Stop backend
        if: always()
        working-directory: mineral-kingdom-api
        run: |
          docker compose down -v || true