name: Full Stack E2E

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      # Next.js BFF route handlers use this to reach the backend API
      API_BASE_URL: http://localhost:8080

      # Ensure backend returns VerificationToken in RegisterResponse (Testing enables this)
      ASPNETCORE_ENVIRONMENT: Testing

    steps:
      # --------------------
      # Checkout frontend repo (this repo)
      # --------------------
      - name: Checkout frontend
        uses: actions/checkout@v4

      # --------------------
      # Checkout backend repo into ./mineral-kingdom-api
      # NOTE: backend repo itself contains a nested folder: mineral-kingdom-api/
      # So compose + .env.example live at:
      #   mineral-kingdom-api/mineral-kingdom-api/docker-compose.yml
      # --------------------
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: josh-everett01/mineral-kingdom-api
          path: mineral-kingdom-api
          fetch-depth: 1

      - name: Backend folder layout (debug)
        run: |
          set -euxo pipefail
          ls -lah
          ls -lah mineral-kingdom-api
          ls -lah mineral-kingdom-api/mineral-kingdom-api

      # --------------------
      # Prepare backend .env (compose references env_file: .env)
      # --------------------
      - name: Create backend .env from example
        working-directory: mineral-kingdom-api/mineral-kingdom-api
        run: |
          set -euxo pipefail

          if [ ! -f .env ]; then
            cp .env.example .env
          fi

          # Force Testing env inside containers (also set at job level, but keep .env consistent)
          if grep -q '^ASPNETCORE_ENVIRONMENT=' .env; then
            sed -i 's/^ASPNETCORE_ENVIRONMENT=.*/ASPNETCORE_ENVIRONMENT=Testing/' .env
          else
            echo 'ASPNETCORE_ENVIRONMENT=Testing' >> .env
          fi

          # Ensure JWT signing key exists for token issuance in tests
          if ! grep -q '^MK_JWT__SIGNING_KEY=' .env; then
            echo 'MK_JWT__SIGNING_KEY=CI_DEV_ONLY_CHANGE_ME_LONG_RANDOM_STRING_1234567890' >> .env
          fi

          echo "---- .env (sanity) ----"
          grep -E '^(ASPNETCORE_ENVIRONMENT|MK_JWT__SIGNING_KEY|MK_DB__)=' .env || true

      # --------------------
      # Start backend with docker compose
      # --------------------
      - name: Start backend via docker compose
        working-directory: mineral-kingdom-api/mineral-kingdom-api
        run: |
          set -euxo pipefail
          docker compose up -d --build postgres api worker
          docker ps

      # --------------------
      # Wait for API readiness
      # Swagger is Development-only, so in Testing it 404s.
      # Instead we probe a real endpoint and accept "not-404" as "routes are up".
      # --------------------
      - name: Wait for backend API to be ready
        run: |
          set -euxo pipefail
          echo "Waiting for API (POST /api/auth/register should return 4xx once routing is live)..."

          for i in {1..60}; do
            code="$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "http://localhost:8080/api/auth/register" \
              -H "content-type: application/json" \
              -d '{}' || true)"

            echo "Attempt $i: HTTP $code"

            # When API is live, we expect 400/409/422/etc (anything except 000/404)
            if [ "$code" != "000" ] && [ "$code" != "404" ]; then
              echo "API is ready (got HTTP $code)."
              exit 0
            fi

            sleep 2
          done

          echo "API did not become ready in time."
          docker ps || true
          docker logs mk_api --tail 200 || true
          exit 1

      # --------------------
      # Create a verified user for auth e2e
      # Backend in Testing returns verificationToken on register.
      # --------------------
      - name: Seed verified E2E user (register + verify)
        id: seed_user
        run: |
          set -euxo pipefail

          EMAIL="mk-ci-$(date +%s)-${RANDOM}@example.com"
          PASSWORD="Str0ngPass!123"

          echo "Creating user: $EMAIL"

          # Register (expect 201 Created; capture token)
          register_json="$(curl -fsS \
            -X POST "http://localhost:8080/api/auth/register" \
            -H "content-type: application/json" \
            -d "{\"email\":\"$EMAIL\",\"password\":\"$PASSWORD\"}")"

          echo "$register_json" | python3 - <<'PY'
import json,sys
obj=json.load(sys.stdin)
tok=obj.get("verificationToken")
if not tok:
  raise SystemExit("verificationToken missing from register response")
print(tok)
PY
          TOKEN="$(echo "$register_json" | python3 -c 'import json,sys; print(json.load(sys.stdin)["verificationToken"])')"

          # Verify email (NoContent 204 on success)
          curl -fsS -o /dev/null \
            -X POST "http://localhost:8080/api/auth/verify-email" \
            -H "content-type: application/json" \
            -d "{\"token\":\"$TOKEN\"}"

          # Export outputs for later steps
          echo "email=$EMAIL" >> "$GITHUB_OUTPUT"
          echo "password=$PASSWORD" >> "$GITHUB_OUTPUT"

      # --------------------
      # Frontend install/build/lint + Playwright
      # --------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mineral-kingdom-web/package-lock.json

      - name: Install deps
        working-directory: mineral-kingdom-web
        run: npm ci

      - name: Lint
        working-directory: mineral-kingdom-web
        run: npm run lint

      - name: Build
        working-directory: mineral-kingdom-web
        run: npm run build

      - name: Install Playwright Browsers
        working-directory: mineral-kingdom-web
        run: npx playwright install --with-deps

      - name: E2E
        working-directory: mineral-kingdom-web
        env:
          # Let the auth.spec.ts run with a known-good verified user
          E2E_EMAIL: ${{ steps.seed_user.outputs.email }}
          E2E_PASSWORD: ${{ steps.seed_user.outputs.password }}

          # Ensure Next.js BFF points at backend during tests
          API_BASE_URL: http://localhost:8080
          ASPNETCORE_ENVIRONMENT: Testing
        run: npm run test:e2e

      - name: Upload Playwright report (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: mineral-kingdom-web/playwright-report/
          if-no-files-found: ignore

      - name: Dump backend logs on failure
        if: failure()
        working-directory: mineral-kingdom-api/mineral-kingdom-api
        run: |
          docker ps || true
          docker logs mk_api --tail 200 || true
          docker logs mk_worker --tail 200 || true
          docker logs mk_postgres --tail 200 || true

      - name: Stop backend
        if: always()
        working-directory: mineral-kingdom-api/mineral-kingdom-api
        run: |
          docker compose down -v || true