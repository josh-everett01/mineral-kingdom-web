name: Full Stack E2E

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      # Next.js BFF will call this
      API_BASE_URL: http://localhost:8080

      # Ensure backend runs in Testing for dev-friendly behaviors (e.g., verificationToken in responses)
      ASPNETCORE_ENVIRONMENT: Testing

      # Playwright config defaults to localhost:${PORT} (PORT defaults to 3005 in your config)
      PORT: 3005
      PLAYWRIGHT_BASE_URL: http://localhost:3005

    steps:
      # --- Frontend repo ---
      - name: Checkout frontend
        uses: actions/checkout@v4

      # --- Backend repo (checked out into subfolder) ---
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: josh-everett01/mineral-kingdom-api
          path: mineral-kingdom-api/mineral-kingdom-api
          fetch-depth: 1

      # --- Create backend .env (compose requires it) ---
      - name: Create backend .env for CI
        working-directory: mineral-kingdom-api/mineral-kingdom-api
        run: |
          if [ ! -f .env ]; then
            cp .env.example .env
          fi

          # Force environment to Testing inside the file too (compose env_file reads this)
          # Safe even if already present.
          if grep -q '^ASPNETCORE_ENVIRONMENT=' .env; then
            sed -i 's/^ASPNETCORE_ENVIRONMENT=.*/ASPNETCORE_ENVIRONMENT=Testing/' .env
          else
            echo 'ASPNETCORE_ENVIRONMENT=Testing' >> .env
          fi

          echo "Backend .env created:"
          ls -lah .env
          echo "ASPNETCORE_ENVIRONMENT in .env:"
          grep '^ASPNETCORE_ENVIRONMENT=' .env || true

      # --- Start backend via docker compose ---
      - name: Start backend via docker compose
        working-directory: mineral-kingdom-api/mineral-kingdom-api
        run: |
          docker compose -f docker-compose.yml up -d --build postgres api worker
          docker compose -f docker-compose.yml ps

      # --- Wait for backend API to be ready ---
      - name: Wait for backend API to be ready
        run: |
          echo "Waiting for API..."

          # Prefer swagger if available; fall back to a basic root probe.
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/swagger/v1/swagger.json >/dev/null 2>&1; then
              echo "API is ready (swagger)."
              exit 0
            fi

            # Some configurations may not expose swagger in Testing; treat any HTTP response as "up".
            if curl -fsS -o /dev/null http://localhost:8080/ >/dev/null 2>&1; then
              echo "API is responding (root)."
              exit 0
            fi

            sleep 2
          done

          echo "API did not become ready in time."
          docker ps || true
          docker logs mk_api --tail 200 || true
          exit 1

      # --- Frontend deps/build/test ---
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mineral-kingdom-web/package-lock.json

      - name: Install deps
        working-directory: mineral-kingdom-web
        run: npm ci

      - name: Lint
        working-directory: mineral-kingdom-web
        run: npm run lint

      - name: Build
        working-directory: mineral-kingdom-web
        run: npm run build

      - name: Install Playwright Browsers
        working-directory: mineral-kingdom-web
        run: npx playwright install --with-deps

      - name: E2E
        working-directory: mineral-kingdom-web
        run: npm run test:e2e

      - name: Upload Playwright report (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: mineral-kingdom-web/playwright-report/
          if-no-files-found: ignore

      # --- Diagnostics ---
      - name: Dump backend logs on failure
        if: failure()
        working-directory: mineral-kingdom-api/mineral-kingdom-api
        run: |
          docker compose -f docker-compose.yml ps || true
          docker logs mk_api --tail 200 || true
          docker logs mk_worker --tail 200 || true
          docker logs mk_postgres --tail 200 || true

      # --- Teardown ---
      - name: Stop backend
        if: always()
        working-directory: mineral-kingdom-api/mineral-kingdom-api
        run: |
          docker compose -f docker-compose.yml down -v