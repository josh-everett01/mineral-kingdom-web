name: Full Stack E2E

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      # Next.js BFF will call this
      API_BASE_URL: http://localhost:8080
      # Make backend include verificationToken in RegisterResponse (Dev/Testing behavior)
      ASPNETCORE_ENVIRONMENT: Testing

      # Optional: Playwright base URL override (your config defaults to localhost:${PORT})
      # PLAYWRIGHT_BASE_URL: http://localhost:3005

    steps:
      # --- Frontend repo ---
      - name: Checkout frontend
        uses: actions/checkout@v4

      # --- Backend repo (checked out into subfolder) ---
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: josh-everett01/mineral-kingdom-api
          path: mineral-kingdom-api
          fetch-depth: 1

      - name: Debug backend folder
        run: |
          ls -la mineral-kingdom-api
          ls -la mineral-kingdom-api | sed -n '1,200p'

      - name: Start backend via docker compose
        working-directory: mineral-kingdom-api
        run: |
          docker compose -f docker-compose.yml up -d --build postgres api worker
          docker compose -f docker-compose.yml ps

      - name: Wait for backend API to be ready
        run: |
          echo "Waiting for API..."
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/swagger/v1/swagger.json >/dev/null; then
              echo "API is ready."
              exit 0
            fi
            sleep 2
          done
          echo "API did not become ready in time."
          docker ps
          docker logs mk_api --tail 200 || true
          exit 1

      # --- Frontend deps/build/test ---
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mineral-kingdom-web/package-lock.json

      - name: Install deps
        working-directory: mineral-kingdom-web
        run: npm ci

      - name: Lint
        working-directory: mineral-kingdom-web
        run: npm run lint

      - name: Build
        working-directory: mineral-kingdom-web
        run: npm run build

      - name: Install Playwright Browsers
        working-directory: mineral-kingdom-web
        run: npx playwright install --with-deps

      - name: E2E
        working-directory: mineral-kingdom-web
        run: npm run test:e2e

      - name: Upload Playwright report (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: mineral-kingdom-web/playwright-report/
          if-no-files-found: ignore

      - name: Dump backend logs on failure
        if: failure()
        working-directory: mineral-kingdom-api
        run: |
          docker compose -f docker-compose.yml ps
          docker ps
          docker logs mk_api --tail 200 || true
          docker logs mk_worker --tail 200 || true

      - name: Stop backend
        if: always()
        working-directory: mineral-kingdom-api
        run: |
          docker compose -f docker-compose.yml down -v