name: Full Stack E2E

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: full-stack-e2e-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      API_BASE_URL: http://localhost:8080
      ASPNETCORE_ENVIRONMENT: Testing
      E2E_BACKEND: "1"

    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4

      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: josh-everett01/mineral-kingdom-api
          path: mineral-kingdom-api
          fetch-depth: 1

      - name: Resolve backend directory
        shell: bash
        run: |
          set -euo pipefail

          if [ -f "mineral-kingdom-api/.env.example" ] && [ -f "mineral-kingdom-api/docker-compose.yml" ]; then
            BACKEND_DIR="mineral-kingdom-api"
          elif [ -f "mineral-kingdom-api/mineral-kingdom-api/.env.example" ] && [ -f "mineral-kingdom-api/mineral-kingdom-api/docker-compose.yml" ]; then
            BACKEND_DIR="mineral-kingdom-api/mineral-kingdom-api"
          else
            echo "ERROR: Could not locate backend .env.example + docker-compose.yml"
            echo "Top-level:"
            ls -lah || true
            echo "mineral-kingdom-api:"
            ls -lah mineral-kingdom-api || true
            echo "mineral-kingdom-api/mineral-kingdom-api:"
            ls -lah mineral-kingdom-api/mineral-kingdom-api || true
            exit 1
          fi

          echo "Resolved backend dir: $BACKEND_DIR"
          echo "BACKEND_DIR=$BACKEND_DIR" >> "$GITHUB_ENV"

      - name: Create backend .env from example (CI-safe)
        shell: bash
        run: |
          set -euo pipefail
          cd "$BACKEND_DIR"

          if [ ! -f .env ]; then
            cp .env.example .env
          fi

          if grep -q '^ASPNETCORE_ENVIRONMENT=' .env; then
            sed -i 's/^ASPNETCORE_ENVIRONMENT=.*/ASPNETCORE_ENVIRONMENT=Testing/' .env
          else
            echo 'ASPNETCORE_ENVIRONMENT=Testing' >> .env
          fi

          if grep -q '^MK_JWT__Issuer=' .env; then
            sed -i 's/^MK_JWT__Issuer=.*/MK_JWT__Issuer=mineral-kingdom/' .env
          else
            echo 'MK_JWT__Issuer=mineral-kingdom' >> .env
          fi

          if grep -q '^MK_JWT__Audience=' .env; then
            sed -i 's/^MK_JWT__Audience=.*/MK_JWT__Audience=mineral-kingdom-web/' .env
          else
            echo 'MK_JWT__Audience=mineral-kingdom-web' >> .env
          fi

          if grep -q '^MK_JWT__SigningKey=' .env; then
            sed -i 's/^MK_JWT__SigningKey=.*/MK_JWT__SigningKey=CI_DEV_ONLY_CHANGE_ME_LONG_RANDOM_STRING_1234567890/' .env
          else
            echo 'MK_JWT__SigningKey=CI_DEV_ONLY_CHANGE_ME_LONG_RANDOM_STRING_1234567890' >> .env
          fi

          echo "---- backend .env sanity ----"
          grep -E '^(ASPNETCORE_ENVIRONMENT|MK_DB__|MK_JWT__)=' .env || true

      - name: Start postgres
        shell: bash
        run: |
          set -euo pipefail
          cd "$BACKEND_DIR"
          docker compose up -d postgres
          docker ps

      - name: Wait for postgres healthy
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..60}; do
            if docker exec mk_postgres pg_isready -U mk -d mk >/dev/null 2>&1; then
              echo "Postgres is ready."
              exit 0
            fi
            sleep 2
          done
          echo "Postgres did not become ready in time."
          docker logs mk_postgres --tail 200 || true
          exit 1

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install dotnet-ef
        shell: bash
        run: dotnet tool install --global dotnet-ef

      - name: Run database migrations
        shell: bash
        run: |
          set -euo pipefail
          cd "$BACKEND_DIR"

          dotnet restore MineralKingdom/MineralKingdom.sln

          export MK_DB__HOST=localhost
          export MK_DB__PORT=5432
          export MK_DB__NAME=mk
          export MK_DB__USER=mk
          export MK_DB__PASSWORD=mk_dev_pw
          export ASPNETCORE_ENVIRONMENT=Testing

          dotnet ef database update \
            --project MineralKingdom/MineralKingdom.Infrastructure/MineralKingdom.Infrastructure.csproj \
            --startup-project MineralKingdom/MineralKingdom.Api/MineralKingdom.Api.csproj

      - name: Start api + worker
        shell: bash
        run: |
          set -euo pipefail
          cd "$BACKEND_DIR"
          docker compose up -d --build api worker
          docker ps

      - name: Wait for backend API to be ready
        shell: bash
        run: |
          set -euo pipefail
          echo "Waiting for API /db-ping..."
          for i in {1..60}; do
            code="$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/db-ping || true)"
            echo "Attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then
              echo "API is ready."
              exit 0
            fi
            sleep 2
          done
          echo "API did not become ready in time."
          docker ps || true
          docker logs mk_api --tail 250 || true
          exit 1

      - name: Seed deterministic E2E catalog fixtures
        id: seed_catalog
        shell: bash
        run: |
          set -euo pipefail

          response="$(curl -fsS \
            -X POST "http://localhost:8080/api/testing/e2e/seed" \
            -H "content-type: application/json")"

          echo "$response" > /tmp/e2e-seed.json
          cat /tmp/e2e-seed.json

          python3 - <<'PY'
          import json
          import os

          with open('/tmp/e2e-seed.json') as f:
              data = json.load(f)

          pairs = {
              "store_listing_id": data["storeListingId"],
              "store_listing2_id": data["storeListing2Id"],
              "store_listing3_id": data["storeListing3Id"],
              "auction_listing_id": data["auctionListingId"],
              "auction_id": data["auctionId"],
              "admin_auction_draft_listing_id": data["adminAuctionDraftListingId"],
              "admin_auction_draft_listing_title": data["adminAuctionDraftListingTitle"],
              "admin_auction_scheduled_listing_id": data["adminAuctionScheduledListingId"],
              "admin_auction_scheduled_listing_title": data["adminAuctionScheduledListingTitle"],
              "admin_auction_live_listing_id": data["adminAuctionLiveListingId"],
              "admin_auction_live_listing_title": data["adminAuctionLiveListingTitle"],
              "admin_order_id": data["adminOrderId"],
              "admin_order_number": data["adminOrderNumber"],
              "admin_order_email": data["adminOrderEmail"],
              "admin_fulfillment_requested_group_id": data["adminFulfillmentRequestedGroupId"],
              "admin_fulfillment_requested_order_number": data["adminFulfillmentRequestedOrderNumber"],
              "admin_fulfillment_direct_group_id": data["adminFulfillmentDirectGroupId"],
              "admin_fulfillment_direct_order_number": data["adminFulfillmentDirectOrderNumber"],
              "admin_support_ticket_id": data["adminSupportTicketId"],
              "admin_support_ticket_number": data["adminSupportTicketNumber"],
              "admin_support_ticket_email": data["adminSupportTicketEmail"],
          }

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              for k, v in pairs.items():
                  out.write(f"{k}={v}\n")
          PY

      - name: Wait for app endpoints to stabilize
        shell: bash
        run: |
          set -euo pipefail

          echo "Waiting for app endpoints to stabilize..."

          for i in {1..60}; do
            auth_code="$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "http://localhost:8080/api/auth/register" \
              -H "content-type: application/json" \
              -d '{"email":"healthcheck@example.com","password":"Password123!"}' || true)"

            about_code="$(curl -s -o /dev/null -w "%{http_code}" \
              "http://localhost:8080/api/pages/about" || true)"

            faq_code="$(curl -s -o /dev/null -w "%{http_code}" \
              "http://localhost:8080/api/pages/faq" || true)"

            seed_code="$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "http://localhost:8080/api/testing/e2e/seed" \
              -H "content-type: application/json" || true)"

            echo "Attempt $i: auth=$auth_code about=$about_code faq=$faq_code seed=$seed_code"

            auth_ready="0"
            pages_ready="0"
            seed_ready="0"

            if [ "$auth_code" != "503" ] && [ "$auth_code" != "502" ] && [ "$auth_code" != "000" ]; then
              auth_ready="1"
            fi

            if [ "$about_code" = "200" ] && [ "$faq_code" = "200" ]; then
              pages_ready="1"
            fi

            if [ "$seed_code" = "200" ] || [ "$seed_code" = "204" ]; then
              seed_ready="1"
            fi

            if [ "$auth_ready" = "1" ] && [ "$pages_ready" = "1" ] && [ "$seed_ready" = "1" ]; then
              echo "App endpoints are stable."
              exit 0
            fi

            sleep 2
          done

          echo "App endpoints did not stabilize in time."
          docker ps || true
          docker logs mk_api --tail 400 || true
          docker logs mk_worker --tail 400 || true
          docker logs mk_postgres --tail 400 || true
          exit 1

      - name: Seed verified E2E user (register + verify)
        id: seed_user
        shell: bash
        run: |
          set -euo pipefail

          EMAIL="mk-ci-$(date +%s)-${RANDOM}@example.com"
          PASSWORD="Str0ngPass!123"

          echo "Creating user: $EMAIL"

          register_json=""
          for i in {1..10}; do
            echo "Register attempt $i..."
            http_and_body="$(curl -sS -w "\n%{http_code}" \
              -X POST "http://localhost:8080/api/auth/register" \
              -H "content-type: application/json" \
              -d "{\"email\":\"$EMAIL\",\"password\":\"$PASSWORD\"}" || true)"

            body="$(echo "$http_and_body" | head -n -1)"
            code="$(echo "$http_and_body" | tail -n 1)"

            echo "HTTP $code"
            if [ "$code" = "200" ] || [ "$code" = "201" ]; then
              register_json="$body"
              break
            fi

            if [ "$code" = "503" ] || [ "$code" = "502" ] || [ "$code" = "000" ]; then
              sleep 2
              continue
            fi

            echo "Non-retryable register failure. Body:"
            echo "$body"
            exit 1
          done

          if [ -z "$register_json" ]; then
            echo "Register never succeeded after retries."
            exit 1
          fi

          TOKEN="$(echo "$register_json" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("verificationToken",""))')"
          if [ -z "$TOKEN" ]; then
            echo "Register response did not include verificationToken. Response was:"
            echo "$register_json"
            exit 1
          fi

          verify_ok=""
          for i in {1..10}; do
            code="$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "http://localhost:8080/api/auth/verify-email" \
              -H "content-type: application/json" \
              -d "{\"token\":\"$TOKEN\"}" || true)"

            echo "Verify attempt $i: HTTP $code"
            if [ "$code" = "200" ] || [ "$code" = "204" ]; then
              verify_ok="1"
              break
            fi

            if [ "$code" = "503" ] || [ "$code" = "502" ] || [ "$code" = "000" ]; then
              sleep 2
              continue
            fi

            echo "Non-retryable verify failure (HTTP $code)."
            exit 1
          done

          if [ -z "$verify_ok" ]; then
            echo "Verify never succeeded after retries."
            exit 1
          fi

          echo "email=$EMAIL" >> "$GITHUB_OUTPUT"
          echo "password=$PASSWORD" >> "$GITHUB_OUTPUT"

      - name: Seed verified admin E2E user
        id: seed_admin
        shell: bash
        run: |
          set -euo pipefail

          EMAIL="mk-admin-ci-$(date +%s)-${RANDOM}@example.com"
          PASSWORD="Str0ngPass!123"

          echo "Creating admin fixture user: $EMAIL"

          register_json=""
          for i in {1..10}; do
            echo "Register attempt $i..."
            http_and_body="$(curl -sS -w "\n%{http_code}" \
              -X POST "http://localhost:8080/api/auth/register" \
              -H "content-type: application/json" \
              -d "{\"email\":\"$EMAIL\",\"password\":\"$PASSWORD\"}" || true)"

            body="$(echo "$http_and_body" | head -n -1)"
            code="$(echo "$http_and_body" | tail -n 1)"

            echo "HTTP $code"
            if [ "$code" = "200" ] || [ "$code" = "201" ]; then
              register_json="$body"
              break
            fi

            if [ "$code" = "503" ] || [ "$code" = "502" ] || [ "$code" = "000" ]; then
              sleep 2
              continue
            fi

            echo "Non-retryable register failure. Body:"
            echo "$body"
            exit 1
          done

          if [ -z "$register_json" ]; then
            echo "Register never succeeded after retries."
            exit 1
          fi

          TOKEN="$(echo "$register_json" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("verificationToken",""))')"
          if [ -z "$TOKEN" ]; then
            echo "Register response did not include verificationToken. Response was:"
            echo "$register_json"
            exit 1
          fi

          verify_ok=""
          for i in {1..10}; do
            code="$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "http://localhost:8080/api/auth/verify-email" \
              -H "content-type: application/json" \
              -d "{\"token\":\"$TOKEN\"}" || true)"

            echo "Verify attempt $i: HTTP $code"
            if [ "$code" = "200" ] || [ "$code" = "204" ]; then
              verify_ok="1"
              break
            fi

            if [ "$code" = "503" ] || [ "$code" = "502" ] || [ "$code" = "000" ]; then
              sleep 2
              continue
            fi

            echo "Non-retryable verify failure (HTTP $code)."
            exit 1
          done

          if [ -z "$verify_ok" ]; then
            echo "Verify never succeeded after retries."
            exit 1
          fi

          docker exec mk_postgres psql -U mk -d mk -c \
            "UPDATE users SET \"Role\"='OWNER', \"EmailVerified\"=TRUE, \"UpdatedAt\"=NOW() WHERE \"Email\"='${EMAIL}';"

          echo "email=$EMAIL" >> "$GITHUB_OUTPUT"
          echo "password=$PASSWORD" >> "$GITHUB_OUTPUT"

      - name: Seed verified admin listings E2E user
        id: seed_admin_listings
        shell: bash
        run: |
          set -euo pipefail

          EMAIL="mk-admin-listings-ci-$(date +%s)-${RANDOM}@example.com"
          PASSWORD="Str0ngPass!123"

          echo "Creating admin listings fixture user: $EMAIL"

          register_json=""
          for i in {1..10}; do
            echo "Register attempt $i..."
            http_and_body="$(curl -sS -w "\n%{http_code}" \
              -X POST "http://localhost:8080/api/auth/register" \
              -H "content-type: application/json" \
              -d "{\"email\":\"$EMAIL\",\"password\":\"$PASSWORD\"}" || true)"

            body="$(echo "$http_and_body" | head -n -1)"
            code="$(echo "$http_and_body" | tail -n 1)"

            echo "HTTP $code"
            if [ "$code" = "200" ] || [ "$code" = "201" ]; then
              register_json="$body"
              break
            fi

            if [ "$code" = "503" ] || [ "$code" = "502" ] || [ "$code" = "000" ]; then
              sleep 2
              continue
            fi

            echo "Non-retryable register failure. Body:"
            echo "$body"
            exit 1
          done

          if [ -z "$register_json" ]; then
            echo "Register never succeeded after retries."
            exit 1
          fi

          TOKEN="$(echo "$register_json" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("verificationToken",""))')"
          if [ -z "$TOKEN" ]; then
            echo "Register response did not include verificationToken. Response was:"
            echo "$register_json"
            exit 1
          fi

          verify_ok=""
          for i in {1..10}; do
            code="$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "http://localhost:8080/api/auth/verify-email" \
              -H "content-type: application/json" \
              -d "{\"token\":\"$TOKEN\"}" || true)"

            echo "Verify attempt $i: HTTP $code"
            if [ "$code" = "200" ] || [ "$code" = "204" ]; then
              verify_ok="1"
              break
            fi

            if [ "$code" = "503" ] || [ "$code" = "502" ] || [ "$code" = "000" ]; then
              sleep 2
              continue
            fi

            echo "Non-retryable verify failure (HTTP $code)."
            exit 1
          done

          if [ -z "$verify_ok" ]; then
            echo "Verify never succeeded after retries."
            exit 1
          fi

          docker exec mk_postgres psql -U mk -d mk -c \
            "UPDATE users SET \"Role\"='OWNER', \"EmailVerified\"=TRUE, \"UpdatedAt\"=NOW() WHERE \"Email\"='${EMAIL}';"

          echo "email=$EMAIL" >> "$GITHUB_OUTPUT"
          echo "password=$PASSWORD" >> "$GITHUB_OUTPUT"

      - name: Seed verified staff E2E user
        id: seed_staff
        shell: bash
        run: |
          set -euo pipefail

          EMAIL="mk-staff-ci-$(date +%s)-${RANDOM}@example.com"
          PASSWORD="Str0ngPass!123"

          echo "Creating staff fixture user: $EMAIL"

          register_json=""
          for i in {1..10}; do
            echo "Register attempt $i..."
            http_and_body="$(curl -sS -w "\n%{http_code}" \
              -X POST "http://localhost:8080/api/auth/register" \
              -H "content-type: application/json" \
              -d "{\"email\":\"$EMAIL\",\"password\":\"$PASSWORD\"}" || true)"

            body="$(echo "$http_and_body" | head -n -1)"
            code="$(echo "$http_and_body" | tail -n 1)"

            echo "HTTP $code"
            if [ "$code" = "200" ] || [ "$code" = "201" ]; then
              register_json="$body"
              break
            fi

            if [ "$code" = "503" ] || [ "$code" = "502" ] || [ "$code" = "000" ]; then
              sleep 2
              continue
            fi

            echo "Non-retryable register failure. Body:"
            echo "$body"
            exit 1
          done

          if [ -z "$register_json" ]; then
            echo "Register never succeeded after retries."
            exit 1
          fi

          TOKEN="$(echo "$register_json" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("verificationToken",""))')"
          if [ -z "$TOKEN" ]; then
            echo "Register response did not include verificationToken. Response was:"
            echo "$register_json"
            exit 1
          fi

          verify_ok=""
          for i in {1..10}; do
            code="$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "http://localhost:8080/api/auth/verify-email" \
              -H "content-type: application/json" \
              -d "{\"token\":\"$TOKEN\"}" || true)"

            echo "Verify attempt $i: HTTP $code"
            if [ "$code" = "200" ] || [ "$code" = "204" ]; then
              verify_ok="1"
              break
            fi

            if [ "$code" = "503" ] || [ "$code" = "502" ] || [ "$code" = "000" ]; then
              sleep 2
              continue
            fi

            echo "Non-retryable verify failure (HTTP $code)."
            exit 1
          done

          if [ -z "$verify_ok" ]; then
            echo "Verify never succeeded after retries."
            exit 1
          fi

          docker exec mk_postgres psql -U mk -d mk -c \
            "UPDATE users SET \"Role\"='STAFF', \"EmailVerified\"=TRUE, \"UpdatedAt\"=NOW() WHERE \"Email\"='${EMAIL}';"

          echo "email=$EMAIL" >> "$GITHUB_OUTPUT"
          echo "password=$PASSWORD" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mineral-kingdom-web/package-lock.json

      - name: Install deps
        working-directory: mineral-kingdom-web
        run: npm ci

      - name: Lint
        working-directory: mineral-kingdom-web
        run: npm run lint

      - name: Build
        working-directory: mineral-kingdom-web
        run: npm run build

      - name: Install Playwright Browsers
        working-directory: mineral-kingdom-web
        run: npx playwright install --with-deps

      - name: E2E
        working-directory: mineral-kingdom-web
        env:
          E2E_BACKEND: "1"
          E2E_EMAIL: ${{ steps.seed_user.outputs.email }}
          E2E_PASSWORD: ${{ steps.seed_user.outputs.password }}
          E2E_ADMIN_EMAIL: ${{ steps.seed_admin.outputs.email }}
          E2E_ADMIN_PASSWORD: ${{ steps.seed_admin.outputs.password }}
          E2E_ADMIN_LISTINGS_EMAIL: ${{ steps.seed_admin_listings.outputs.email }}
          E2E_ADMIN_LISTINGS_PASSWORD: ${{ steps.seed_admin_listings.outputs.password }}
          E2E_STAFF_EMAIL: ${{ steps.seed_staff.outputs.email }}
          E2E_STAFF_PASSWORD: ${{ steps.seed_staff.outputs.password }}
          E2E_ADMIN_STORE_OFFERS_LISTING_ID: ${{ steps.seed_catalog.outputs.store_listing_id }}
          E2E_ADMIN_STORE_OFFERS_LISTING_TITLE: Rainbow Fluorite Tower
          E2E_ADMIN_AUCTIONS_DRAFT_LISTING_ID: ${{ steps.seed_catalog.outputs.admin_auction_draft_listing_id }}
          E2E_ADMIN_AUCTIONS_DRAFT_LISTING_TITLE: ${{ steps.seed_catalog.outputs.admin_auction_draft_listing_title }}
          E2E_ADMIN_AUCTIONS_SCHEDULED_LISTING_ID: ${{ steps.seed_catalog.outputs.admin_auction_scheduled_listing_id }}
          E2E_ADMIN_AUCTIONS_SCHEDULED_LISTING_TITLE: ${{ steps.seed_catalog.outputs.admin_auction_scheduled_listing_title }}
          E2E_ADMIN_AUCTIONS_LIVE_LISTING_ID: ${{ steps.seed_catalog.outputs.admin_auction_live_listing_id }}
          E2E_ADMIN_AUCTIONS_LIVE_LISTING_TITLE: ${{ steps.seed_catalog.outputs.admin_auction_live_listing_title }}
          E2E_ADMIN_ORDERS_ORDER_ID: ${{ steps.seed_catalog.outputs.admin_order_id }}
          E2E_ADMIN_ORDERS_ORDER_NUMBER: ${{ steps.seed_catalog.outputs.admin_order_number }}
          E2E_ADMIN_ORDERS_ORDER_EMAIL: ${{ steps.seed_catalog.outputs.admin_order_email }}
          E2E_ADMIN_FULFILLMENT_EMAIL: ${{ steps.seed_admin_listings.outputs.email }}
          E2E_ADMIN_FULFILLMENT_PASSWORD: ${{ steps.seed_admin_listings.outputs.password }}
          E2E_ADMIN_FULFILLMENT_REQUESTED_GROUP_ID: ${{ steps.seed_catalog.outputs.admin_fulfillment_requested_group_id }}
          E2E_ADMIN_FULFILLMENT_REQUESTED_ORDER_NUMBER: ${{ steps.seed_catalog.outputs.admin_fulfillment_requested_order_number }}
          E2E_ADMIN_FULFILLMENT_DIRECT_GROUP_ID: ${{ steps.seed_catalog.outputs.admin_fulfillment_direct_group_id }}
          E2E_ADMIN_FULFILLMENT_DIRECT_ORDER_NUMBER: ${{ steps.seed_catalog.outputs.admin_fulfillment_direct_order_number }}
          E2E_ADMIN_SUPPORT_TICKET_ID: ${{ steps.seed_catalog.outputs.admin_support_ticket_id }}
          E2E_ADMIN_SUPPORT_TICKET_NUMBER: ${{ steps.seed_catalog.outputs.admin_support_ticket_number }}
          E2E_ADMIN_SUPPORT_TICKET_EMAIL: ${{ steps.seed_catalog.outputs.admin_support_ticket_email }}
          E2E_ADMIN_SUPPORT_FILTER_STATUS: OPEN
          E2E_ADMIN_SUPPORT_FILTER_PRIORITY: HIGH
          API_BASE_URL: http://localhost:8080
          ASPNETCORE_ENVIRONMENT: Testing
        run: npm run test:e2e

      - name: Upload Playwright report (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: mineral-kingdom-web/playwright-report/
          if-no-files-found: ignore

      - name: Dump backend logs on failure
        if: failure()
        shell: bash
        run: |
          docker ps || true
          docker logs mk_api --tail 300 || true
          docker logs mk_worker --tail 300 || true
          docker logs mk_postgres --tail 300 || true

      - name: Stop backend
        if: always()
        shell: bash
        run: |
          set +e
          cd "$BACKEND_DIR"
          docker compose down -v