name: Full Stack E2E

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      API_BASE_URL: http://localhost:8080
      ASPNETCORE_ENVIRONMENT: Testing

      # Auth test credentials (we seed these)
      E2E_EMAIL: mk-ci-${{ github.run_id }}-${{ github.run_attempt }}@example.com
      E2E_PASSWORD: Str0ngPass!123

      # Backend repo lands nested (per your log)
      BACKEND_DIR: mineral-kingdom-api/mineral-kingdom-api

    steps:
      # --- Frontend repo ---
      - name: Checkout frontend
        uses: actions/checkout@v4

      # --- Backend repo (checked out into subfolder) ---
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: josh-everett01/mineral-kingdom-api
          path: mineral-kingdom-api
          fetch-depth: 1

      - name: Show backend folder layout (debug)
        run: |
          set -euxo pipefail
          ls -lah
          ls -lah mineral-kingdom-api
          ls -lah "${BACKEND_DIR}"

      # --- Backend: create .env in the RIGHT folder and start compose ---
      - name: Create backend .env (from example)
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          set -euxo pipefail

          ls -lah

          if [ ! -f .env ]; then
            cp .env.example .env
          fi

          # Force CI-friendly values
          sed -i 's/^ASPNETCORE_ENVIRONMENT=.*/ASPNETCORE_ENVIRONMENT=Testing/' .env
          sed -i 's/^MK_JWT__SIGNING_KEY=.*/MK_JWT__SIGNING_KEY=CI_ONLY_LONG_RANDOM_SIGNING_KEY_CHANGE_ME_0123456789abcdef0123456789abcdef/' .env
          sed -i 's/^MK_EMAIL__PROVIDER=.*/MK_EMAIL__PROVIDER=NONE/' .env

          echo "----- .env (sanity) -----"
          grep -E "ASPNETCORE_ENVIRONMENT|MK_DB__|MK_JWT__|MK_EMAIL__PROVIDER" .env || true

      - name: Start backend via docker compose
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          set -euxo pipefail
          docker compose -f docker-compose.yml up -d --build postgres api worker
          docker compose -f docker-compose.yml ps
          docker ps -a

      - name: Wait for backend API to be ready
        run: |
          set -euxo pipefail

          echo "Waiting for API on :8080 (Swagger may be disabled in Testing)..."
          for i in {1..60}; do
            # Any non-000 indicates the port is accepting connections
            code="$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ || true)"
            if [ "$code" != "000" ]; then
              echo "API is reachable (HTTP $code)."
              exit 0
            fi
            sleep 2
          done

          echo "API did not become reachable in time."
          docker ps -a || true
          docker logs mk_api --tail 200 || true
          docker logs mk_worker --tail 200 || true
          docker logs mk_postgres --tail 200 || true
          exit 1

      # --- Seed auth user for auth.spec.ts ---
      - name: Seed E2E user (register + verify email)
        run: |
          set -euxo pipefail
          echo "Seeding E2E user: $E2E_EMAIL"

          python - << 'PY'
          import json, os, urllib.request, urllib.error

          email = os.environ["E2E_EMAIL"]
          password = os.environ["E2E_PASSWORD"]

          def post(url, payload):
            req = urllib.request.Request(
              url,
              method="POST",
              headers={"content-type":"application/json"},
              data=json.dumps(payload).encode("utf-8"),
            )
            try:
              with urllib.request.urlopen(req, timeout=20) as resp:
                body = resp.read().decode("utf-8")
                return resp.status, (json.loads(body) if body else None)
            except urllib.error.HTTPError as e:
              raw = e.read().decode("utf-8")
              try:
                parsed = json.loads(raw) if raw else None
              except Exception:
                parsed = raw
              return e.code, parsed

          # Register
          status, data = post("http://localhost:8080/api/auth/register", {"email": email, "password": password})
          print("REGISTER status:", status)
          print("REGISTER data:", data)

          token = None
          if isinstance(data, dict):
            token = data.get("verificationToken")

          # Verify if token present
          if token:
            status2, _ = post("http://localhost:8080/api/auth/verify-email", {"token": token})
            print("VERIFY status:", status2)
          else:
            print("No verificationToken returned; continuing.")
          PY

      # --- Frontend deps/build/test ---
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mineral-kingdom-web/package-lock.json

      - name: Install deps
        working-directory: mineral-kingdom-web
        run: npm ci

      - name: Lint
        working-directory: mineral-kingdom-web
        run: npm run lint

      - name: Build
        working-directory: mineral-kingdom-web
        run: npm run build

      - name: Install Playwright Browsers
        working-directory: mineral-kingdom-web
        run: npx playwright install --with-deps

      - name: E2E
        working-directory: mineral-kingdom-web
        run: npm run test:e2e

      - name: Upload Playwright report (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: mineral-kingdom-web/playwright-report/
          if-no-files-found: ignore

      - name: Dump backend logs on failure
        if: failure()
        run: |
          docker ps -a || true
          docker logs mk_api --tail 200 || true
          docker logs mk_worker --tail 200 || true
          docker logs mk_postgres --tail 200 || true

      - name: Stop backend
        if: always()
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          docker compose -f docker-compose.yml down -v || true