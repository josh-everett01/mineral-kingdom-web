name: Full Stack E2E

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: full-stack-e2e-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # Next.js BFF route handlers use this to reach the backend API
      API_BASE_URL: http://localhost:8080
      # Backend behavior (token surfacing, etc.)
      ASPNETCORE_ENVIRONMENT: Testing

    steps:
      # --------------------
      # Checkout frontend repo (this repo)
      # --------------------
      - name: Checkout frontend
        uses: actions/checkout@v4

      # --------------------
      # Checkout backend repo into ./mineral-kingdom-api
      # --------------------
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: josh-everett01/mineral-kingdom-api
          path: mineral-kingdom-api
          fetch-depth: 1

      # --------------------
      # Resolve backend directory (repo may contain nested mineral-kingdom-api/)
      # We need the directory that contains BOTH:
      #   - docker-compose.yml
      #   - .env.example
      # --------------------
      - name: Resolve backend dir
        run: |
          set -euo pipefail

          if [ -f "mineral-kingdom-api/docker-compose.yml" ] && [ -f "mineral-kingdom-api/.env.example" ]; then
            BACKEND_DIR="mineral-kingdom-api"
          elif [ -f "mineral-kingdom-api/mineral-kingdom-api/docker-compose.yml" ] && [ -f "mineral-kingdom-api/mineral-kingdom-api/.env.example" ]; then
            BACKEND_DIR="mineral-kingdom-api/mineral-kingdom-api"
          else
            echo "ERROR: Could not locate backend docker-compose.yml + .env.example"
            echo "Top-level:"
            ls -lah || true
            echo "mineral-kingdom-api:"
            ls -lah mineral-kingdom-api || true
            echo "mineral-kingdom-api/mineral-kingdom-api:"
            ls -lah mineral-kingdom-api/mineral-kingdom-api || true
            exit 1
          fi

          echo "Resolved BACKEND_DIR=$BACKEND_DIR"
          echo "BACKEND_DIR=$BACKEND_DIR" >> "$GITHUB_ENV"

      - name: Backend layout (debug)
        run: |
          set -euxo pipefail
          echo "BACKEND_DIR=${BACKEND_DIR}"
          ls -lah "${BACKEND_DIR}"

      # --------------------
      # Prepare backend .env (compose references env_file: .env)
      # Ensure JWT settings exist so login works (fixes MK_JWT config missing)
      # --------------------
      - name: Create backend .env from example
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          set -euxo pipefail

          if [ ! -f .env ]; then
            cp .env.example .env
          fi

          # Force Testing
          if grep -q '^ASPNETCORE_ENVIRONMENT=' .env; then
            sed -i 's/^ASPNETCORE_ENVIRONMENT=.*/ASPNETCORE_ENVIRONMENT=Testing/' .env
          else
            echo 'ASPNETCORE_ENVIRONMENT=Testing' >> .env
          fi

          # Ensure issuer/audience exist (some environments treat missing as fatal)
          if ! grep -q '^MK_JWT__ISSUER=' .env; then
            echo 'MK_JWT__ISSUER=mineral-kingdom' >> .env
          fi
          if ! grep -q '^MK_JWT__AUDIENCE=' .env; then
            echo 'MK_JWT__AUDIENCE=mineral-kingdom-web' >> .env
          fi

          # Ensure signing key is usable (not placeholder)
          if grep -q '^MK_JWT__SIGNING_KEY=' .env; then
            sed -i 's/^MK_JWT__SIGNING_KEY=.*/MK_JWT__SIGNING_KEY=CI_DEV_ONLY_CHANGE_ME_LONG_RANDOM_STRING_1234567890/' .env
          else
            echo 'MK_JWT__SIGNING_KEY=CI_DEV_ONLY_CHANGE_ME_LONG_RANDOM_STRING_1234567890' >> .env
          fi

          echo "---- .env sanity ----"
          grep -E '^(ASPNETCORE_ENVIRONMENT|MK_DB__|MK_JWT__)=' .env || true

      # --------------------
      # Start backend via docker compose (use --env-file to guarantee env injection)
      # --------------------
      - name: Start backend via docker compose
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          set -euxo pipefail
          docker compose --env-file .env up -d --build postgres api worker
          docker ps

      # --------------------
      # Wait for backend API readiness
      # --------------------
      - name: Wait for backend API to be ready
        run: |
          set -euxo pipefail
          echo "Waiting for API (GET /db-ping)..."
          for i in {1..90}; do
            code="$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/db-ping || true)"
            echo "Attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then
              echo "API is ready."
              exit 0
            fi
            sleep 2
          done
          echo "API did not become ready in time."
          docker ps || true
          exit 1

      # --------------------
      # Seed verified E2E user (register + verify)
      # --------------------
      - name: Seed verified E2E user (register + verify)
        id: seed_user
        run: |
          set -euxo pipefail

          EMAIL="mk-ci-$(date +%s)-${RANDOM}@example.com"
          PASSWORD="Str0ngPass!123"
          echo "Creating user: $EMAIL"

          register_json="$(curl -fsS \
            -X POST "http://localhost:8080/api/auth/register" \
            -H "content-type: application/json" \
            -d "{\"email\":\"$EMAIL\",\"password\":\"$PASSWORD\"}")"

          TOKEN="$(echo "$register_json" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("verificationToken",""))')"
          if [ -z "$TOKEN" ]; then
            echo "Register response did not include verificationToken. Response was:"
            echo "$register_json"
            exit 1
          fi

          curl -fsS -o /dev/null \
            -X POST "http://localhost:8080/api/auth/verify-email" \
            -H "content-type: application/json" \
            -d "{\"token\":\"$TOKEN\"}"

          echo "email=$EMAIL" >> "$GITHUB_OUTPUT"
          echo "password=$PASSWORD" >> "$GITHUB_OUTPUT"

      # --------------------
      # Frontend install/build/lint + Playwright
      # --------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mineral-kingdom-web/package-lock.json

      - name: Install deps
        working-directory: mineral-kingdom-web
        run: npm ci

      - name: Lint
        working-directory: mineral-kingdom-web
        run: npm run lint

      - name: Build
        working-directory: mineral-kingdom-web
        run: npm run build

      - name: Install Playwright Browsers
        working-directory: mineral-kingdom-web
        run: npx playwright install --with-deps

      - name: E2E
        working-directory: mineral-kingdom-web
        env:
          E2E_EMAIL: ${{ steps.seed_user.outputs.email }}
          E2E_PASSWORD: ${{ steps.seed_user.outputs.password }}
          API_BASE_URL: http://localhost:8080
          ASPNETCORE_ENVIRONMENT: Testing
        run: npm run test:e2e

      - name: Upload Playwright report (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: mineral-kingdom-web/playwright-report/
          if-no-files-found: ignore

      - name: Dump backend logs on failure
        if: failure()
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          docker ps || true
          docker compose logs --no-color --tail=300 api worker postgres || true

      - name: Stop backend
        if: always()
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          docker compose down -v || true